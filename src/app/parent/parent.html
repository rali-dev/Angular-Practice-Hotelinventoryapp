<div class="parent">
   <label>Parent Component</label><br>
   <input type="text" placeholder="send message to child" #p>
   <button (click)="sendMessage(p.value)">Send Message</button>
   <h4>Message from child: {{childData()}}</h4>
</div>

<br>
<hinv-child [parentData]="parentMessage()" (childMessage)="receiveMessage($event)"></hinv-child>
