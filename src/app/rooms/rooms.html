<!-- <p>welcome to {{ hotelName }}</p> -->
 <hinv-header></hinv-header>

<div [hidden]="hideRooms">
  Number of rooms:

  <div 
  [ngStyle]="{'color': rooms.availableRooms ? 'green' : 'red'}" 
  [innerText]="numberOfRooms"
  >
  </div>
</div>

{{ (rooms.availableRooms ?? 0) > 0 ? rooms.availableRooms : 'No Rooms Available' }}

<br>
<button (click)="addRoom()">
    Add Room 
</button>

<div *ngIf="selectedRoom">
  {{ selectedRoom | json}}
</div>

<div *ngIf="(rooms.availableRooms ?? 0) > 0">
   <hinv-rooms-list [rooms]="roomList" [title]= "title"
   (selectedRoom)="selectRoom($event)"></hinv-rooms-list>
</div>

<button (click)="toggle()">Toggle Rooms</button>
